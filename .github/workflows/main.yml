name: Agritech CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code from the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup python 
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # CPU version of PyTorch (compatibile con GitHub Actions)
        pip install torch==2.11.0 torchvision==0.26.0 --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt

    # 4. Execute tests with coverage measurement
    - name: Run Tests with Coverage
      env:
        PYTHONPATH: "."
        # Avoiding CUDA initialization issues in GitHub Actions by forcing CPU usage
        CUDA_VISIBLE_DEVICES: ""
      run: |
        pytest --cov=src --cov-report=term-missing tests/

    # 5. Report results using CML (Continuous Machine Learning)
    - name: Setup CML
      uses: iterative/setup-cml@v1
    
    - name: Write CML Report
      env:
        REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "## 📊 Test & Coverage Report" > report.md
        echo "Pipeline executed successfully on $(date)" >> report.md
        echo "### Coverage Summary" >> report.md
        echo '```' >> report.md
        PYTHONPATH=. pytest --cov=src --cov-report=term tests/ >> report.md
        echo '```' >> report.md
        cml comment create report.md